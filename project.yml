name: AetherLearn
options:
  bundleIdPrefix: app.neun.aether.learn
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "7LAGLNXS6L"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AetherLearn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Aether
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.neun.aether.learn
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Aether/Resources/Info.plist
      properties:
        CFBundleDisplayName: Aether Learn
        # Track the build settings, or XcodeGen bakes in its own "1.0"/"1"
        # defaults and every upload collides with build 1.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # No custom/non-exempt encryption, so uploads skip the export-compliance
        # prompt that would otherwise stall every TestFlight build.
        ITSAppUsesNonExemptEncryption: false
        # Needed to save the shareable completion image to the camera roll.
        NSPhotoLibraryAddUsageDescription: "Save your module-completion image so you can share it."
        UIAppFonts:
          - SpaceGrotesk.ttf
          - JetBrainsMono.ttf
